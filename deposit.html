<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="deposit-body">

  <!-- HEADER -->
  <header class="deposit-header">
    <h2>Make a Deposit</h2>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="deposit-container">

    <!-- LEFT: Deposit Form -->
    <div class="deposit-form card">
      <h2>Deposit Funds</h2>

      <label for="paymentMethod">Payment Method</label>
      <select id="paymentMethod">
        <option>USDT (ERC 20)</option>
        <option>USDT</option>
        <option>Ethereum</option>
        <option>Bitcoin</option>
      </select>

      <label for="depositAmount">Amount to Deposit</label>
      <input type="number" id="depositAmount" placeholder="$0.00">

      <button onclick="submitDeposit()">Proceed</button>
    </div>

    <!-- RIGHT: Info -->
    <div class="deposit-info">

      <div class="card">
        <h3>Payment Methods</h3>
        <div class="method" onclick="selectMethod('USDT (ERC 20)', this)">USDT (ERC 20)</div>
        <div class="method" onclick="selectMethod('USDT', this)">USDT</div>
        <div class="method" onclick="selectMethod('Ethereum', this)">Ethereum</div>
        <div class="method" onclick="selectMethod('Bitcoin', this)">Bitcoin</div>
      </div>

      <div class="card">
        <h3>How to Deposit</h3>
        <p>1. Choose your payment method</p>
        <p>2. Enter deposit amount</p>
        <p>3. Complete secure payment</p>
      </div>

    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
